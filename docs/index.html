<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LocalFlux — Bare-Metal LAN Quiz Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              red:  '#b91c1c',
              gold: '#f59e0b',
            }
          },
          fontFamily: {
            mono: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body class="bg-zinc-950 text-zinc-200 font-sans antialiased">

  <!-- ===================== NAV ===================== -->
  <header class="fixed top-0 inset-x-0 z-50 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-sm">
    <nav class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <a href="/" class="text-base font-black tracking-tight">
        Local<span class="text-amber-500">Flux</span>
      </a>
      <a
        href="https://github.com/Unknownbeliek/foss-hack-quiz-engine"
        target="_blank"
        class="text-sm text-zinc-400 hover:text-amber-500 transition-colors font-medium"
      >
        GitHub ↗
      </a>
    </nav>
  </header>

  <!-- ===================== HERO ===================== -->
  <main>
    <section class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-14">

      <p class="text-xs font-mono tracking-widest uppercase text-amber-500 mb-5">
        FossHack 2025 Project
      </p>

      <h1 class="text-7xl sm:text-9xl font-black tracking-tighter text-amber-500 leading-none mb-6">
        LocalFlux
      </h1>

      <p class="text-lg sm:text-xl text-zinc-400 max-w-xl leading-relaxed mb-10">
        The zero-latency, bare-metal LAN multiplayer engine.
      </p>

      <div class="flex flex-wrap gap-4 justify-center">
        <a
          href="https://github.com/Unknownbeliek/foss-hack-quiz-engine"
          target="_blank"
          class="px-6 py-3 border border-amber-500 text-amber-500 hover:bg-amber-500 hover:text-zinc-950 rounded-lg text-sm font-semibold transition-colors"
        >
          View GitHub Repo ↗
        </a>
        <a
          href="#docs"
          class="px-6 py-3 bg-red-700 hover:bg-red-600 text-white rounded-lg text-sm font-semibold transition-colors"
        >
          Read the Docs
        </a>
      </div>

    </section>
  </main>

</body>
</html>
